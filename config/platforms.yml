# Platform Integrations Configuration
# BlackRoad OS - Unified platform integration config for all services
# All credentials should be stored in environment variables, not in this file

version: "1.0"

# =============================================================================
# DEPLOYMENT PLATFORMS
# =============================================================================

deployment:
  railway:
    enabled: true
    description: "Primary deployment platform for Node.js services"
    envVars:
      - RAILWAY_TOKEN
      - RAILWAY_PROJECT_ID
    healthcheck: "/health"
    regions:
      - us-west-2
      - eu-west-1
    config:
      builder: "NIXPACKS"
      startCommand: "npx tsx src/index.ts"
      port: 3000

  cloudflare:
    enabled: true
    description: "Edge deployment for Workers and Pages"
    services:
      pages:
        enabled: true
        buildCommand: "npm run build"
        buildOutput: "dist"
      workers:
        enabled: true
        compatibilityDate: "2024-01-01"
      kv:
        enabled: true
        namespaces:
          - POLICY
          - LEDGER
          - AGENT
          - INTENT
          - CLAIM
          - DELEGATION
      r2:
        enabled: true
        buckets:
          - blackroad-assets
          - blackroad-backups
      tunnels:
        enabled: true
        description: "Cloudflare Tunnel for secure connections"
    envVars:
      - CLOUDFLARE_API_TOKEN
      - CLOUDFLARE_ACCOUNT_ID
      - CLOUDFLARE_ZONE_ID

  vercel:
    enabled: true
    description: "Serverless deployment for frontend and APIs"
    framework: "auto"
    buildCommand: "npm run build"
    outputDirectory: "dist"
    regions:
      - iad1  # US East
      - sfo1  # US West
      - cdg1  # Europe
    envVars:
      - VERCEL_TOKEN
      - VERCEL_ORG_ID
      - VERCEL_PROJECT_ID
    features:
      edgeFunctions: true
      serverlessFunctions: true
      analytics: true

  digitalocean:
    enabled: true
    description: "Droplet-based VPS deployment"
    droplets:
      sizes:
        micro: "s-1vcpu-1gb"
        small: "s-2vcpu-2gb"
        medium: "s-4vcpu-8gb"
        large: "s-8vcpu-16gb"
      regions:
        - nyc1
        - sfo3
        - ams3
        - sgp1
      images:
        ubuntu: "ubuntu-24-04-x64"
        debian: "debian-12-x64"
        docker: "docker-20-04"
    kubernetes:
      enabled: true
      clusterName: "blackroad-k8s"
    spaces:
      enabled: true
      bucket: "blackroad-storage"
    envVars:
      - DIGITALOCEAN_TOKEN
      - DIGITALOCEAN_SPACES_KEY
      - DIGITALOCEAN_SPACES_SECRET

  docker:
    enabled: true
    description: "Container runtime configuration"
    registry:
      - ghcr.io
      - docker.io
    baseImages:
      node: "node:20-alpine"
      python: "python:3.12-slim"
      rust: "rust:1.75-alpine"
    compose:
      version: "3.9"
      networks:
        - blackroad-net
    envVars:
      - DOCKER_USERNAME
      - DOCKER_PASSWORD
      - DOCKER_REGISTRY

  raspberrypi:
    enabled: true
    description: "Edge computing on Raspberry Pi devices"
    supportedModels:
      - pi4
      - pi5
      - zero2w
    architecture: "arm64"
    os: "raspios-bookworm-arm64"
    deployment:
      method: "ssh"
      defaultUser: "pi"
      serviceManager: "systemd"
    services:
      - name: "blackroad-agent"
        port: 3000
        autostart: true
      - name: "blackroad-monitor"
        port: 3001
        autostart: true
    envVars:
      - PI_SSH_HOST
      - PI_SSH_USER
      - PI_SSH_KEY

# =============================================================================
# SOURCE CONTROL & PROJECT MANAGEMENT
# =============================================================================

sourceControl:
  github:
    enabled: true
    description: "Primary source control and CI/CD"
    graphql:
      endpoint: "https://api.github.com/graphql"
      projectsV2:
        enabled: true
        mutations:
          updateField: true
          addItem: true
          removeItem: true
    webhooks:
      - issues
      - pull_requests
      - push
      - release
      - workflow_run
    actions:
      runners:
        - ubuntu-latest
        - macos-latest
        - self-hosted
    envVars:
      - GITHUB_TOKEN
      - GITHUB_APP_ID
      - GITHUB_APP_PRIVATE_KEY

projectManagement:
  asana:
    enabled: true
    description: "Project and task management"
    apiVersion: "1.0"
    features:
      tasks: true
      projects: true
      portfolios: true
      goals: true
      webhooks: true
    sync:
      githubIssues: true
      slackNotifications: true
    envVars:
      - ASANA_ACCESS_TOKEN
      - ASANA_WORKSPACE_ID
      - ASANA_PROJECT_ID

  notion:
    enabled: true
    description: "Documentation and knowledge base"
    apiVersion: "2022-06-28"
    features:
      databases: true
      pages: true
      blocks: true
      comments: true
      search: true
    sync:
      githubWiki: true
      autoBackup: true
    envVars:
      - NOTION_TOKEN
      - NOTION_DATABASE_ID
      - NOTION_WORKSPACE_ID

# =============================================================================
# AUTHENTICATION & PAYMENTS
# =============================================================================

authentication:
  clerk:
    enabled: true
    description: "User authentication and session management"
    apiVersion: "2024-01"
    features:
      emailPassword: true
      socialLogin:
        - google
        - github
        - discord
      mfa: true
      organizations: true
      webhooks: true
    jwt:
      algorithm: "RS256"
      expiresIn: "1h"
    envVars:
      - CLERK_PUBLISHABLE_KEY
      - CLERK_SECRET_KEY
      - CLERK_WEBHOOK_SECRET

payments:
  stripe:
    enabled: true
    description: "Payment processing and subscriptions"
    apiVersion: "2024-04-10"
    features:
      checkout: true
      subscriptions: true
      invoices: true
      paymentIntents: true
      webhooks: true
      connect: false  # Marketplace features
    products:
      - id: "prod_free"
        name: "Free Tier"
        price: 0
      - id: "prod_pro"
        name: "Pro Tier"
        price: 2900  # cents
      - id: "prod_enterprise"
        name: "Enterprise"
        price: null  # custom
    webhookEvents:
      - checkout.session.completed
      - customer.subscription.created
      - customer.subscription.updated
      - customer.subscription.deleted
      - invoice.paid
      - invoice.payment_failed
    envVars:
      - STRIPE_PUBLISHABLE_KEY
      - STRIPE_SECRET_KEY
      - STRIPE_WEBHOOK_SECRET

# =============================================================================
# AI & MACHINE LEARNING
# =============================================================================

ai:
  huggingface:
    enabled: true
    description: "Open source ML models and inference"
    apiEndpoint: "https://api-inference.huggingface.co"
    spaces:
      enabled: true
      runtime: "docker"
    models:
      # Text generation - audited open source models
      textGeneration:
        - id: "meta-llama/Llama-3.2-3B-Instruct"
          audited: true
          license: "llama3.2"
          safety: "verified"
        - id: "mistralai/Mistral-7B-Instruct-v0.3"
          audited: true
          license: "apache-2.0"
          safety: "verified"
        - id: "google/gemma-2-9b-it"
          audited: true
          license: "gemma"
          safety: "verified"
      # Embeddings
      embeddings:
        - id: "sentence-transformers/all-MiniLM-L6-v2"
          audited: true
          license: "apache-2.0"
        - id: "BAAI/bge-large-en-v1.5"
          audited: true
          license: "mit"
      # Image generation
      imageGeneration:
        - id: "stabilityai/stable-diffusion-xl-base-1.0"
          audited: true
          license: "openrail++"
    envVars:
      - HUGGINGFACE_TOKEN
      - HUGGINGFACE_SPACE_ID

  openSourceModels:
    enabled: true
    description: "Auditable, forkable open source AI models"
    policy:
      requireAudit: true
      allowedLicenses:
        - apache-2.0
        - mit
        - llama3.2
        - gemma
        - openrail++
        - cc-by-4.0
        - cc-by-sa-4.0
      blockedPatterns:
        - "*.gguf"  # Require source weights
        - "*-uncensored*"
        - "*-unfiltered*"
    # Large open source models (120B+ parameters)
    largeModels:
      - name: "Llama 3.1 405B"
        source: "meta-llama/Llama-3.1-405B-Instruct"
        parameters: "405B"
        license: "llama3.1"
        audited: true
        forkable: true
        safety:
          status: "verified"
          lastAudit: "2024-12-01"
          auditor: "internal"
      - name: "DeepSeek V3"
        source: "deepseek-ai/DeepSeek-V3"
        parameters: "671B"
        license: "deepseek"
        audited: true
        forkable: true
        safety:
          status: "verified"
          lastAudit: "2024-12-01"
          auditor: "internal"
      - name: "Qwen 2.5 72B"
        source: "Qwen/Qwen2.5-72B-Instruct"
        parameters: "72B"
        license: "apache-2.0"
        audited: true
        forkable: true
        safety:
          status: "verified"
          lastAudit: "2024-12-01"
          auditor: "internal"
      - name: "Mixtral 8x22B"
        source: "mistralai/Mixtral-8x22B-Instruct-v0.1"
        parameters: "141B"
        license: "apache-2.0"
        audited: true
        forkable: true
        safety:
          status: "verified"
          lastAudit: "2024-12-01"
          auditor: "internal"
    # Model hosting options
    hosting:
      selfHosted:
        enabled: true
        frameworks:
          - vllm
          - text-generation-inference
          - ollama
          - localai
      cloudInference:
        providers:
          - huggingface
          - together
          - anyscale
          - fireworks
    envVars:
      - MODEL_REGISTRY_URL
      - MODEL_AUDIT_KEY

# =============================================================================
# TUNNELING & NETWORKING
# =============================================================================

tunnels:
  cloudflare:
    enabled: true
    description: "Cloudflare Tunnel (formerly Argo)"
    features:
      - zeroTrust: true
      - accessPolicies: true
      - loadBalancing: true
    envVars:
      - CLOUDFLARE_TUNNEL_TOKEN

  ngrok:
    enabled: true
    description: "Development tunneling"
    features:
      customDomains: true
      tcpTunnels: true
      webhookInspection: true
    envVars:
      - NGROK_AUTHTOKEN
      - NGROK_DOMAIN

  tailscale:
    enabled: true
    description: "Mesh VPN for private networking"
    features:
      magicDNS: true
      exitNodes: true
      subnet: true
    envVars:
      - TAILSCALE_AUTHKEY
      - TAILSCALE_TAILNET

  localtunnel:
    enabled: true
    description: "Simple localhost tunneling"
    subdomain: "blackroad"
    envVars: []  # No auth required

# =============================================================================
# MOBILE & DEVELOPMENT TOOLS
# =============================================================================

mobileApps:
  workingCopy:
    enabled: true
    description: "iOS Git client integration"
    features:
      push: true
      pull: true
      commit: true
      branch: true
    urlSchemes:
      - "working-copy://x-callback-url"
    sync:
      autoFetch: true
      interval: 300  # seconds

  shellfish:
    enabled: true
    description: "iOS/macOS SSH and SFTP client"
    features:
      ssh: true
      sftp: true
      mosh: true
      portForwarding: true
    hosts:
      - name: "blackroad-prod"
        type: "production"
      - name: "blackroad-dev"
        type: "development"

  pyto:
    enabled: true
    description: "iOS Python IDE integration"
    features:
      scripts: true
      packages: true
      shortcuts: true
    pythonVersion: "3.11"
    packages:
      - requests
      - pyyaml
      - rich

  warp:
    enabled: true
    description: "Modern terminal with AI features"
    features:
      blocks: true
      workflows: true
      aiCommands: true
      themes: true
    workflows:
      - name: "deploy-railway"
        command: "railway up"
      - name: "deploy-vercel"
        command: "vercel --prod"
      - name: "run-tests"
        command: "npm test"
    theme: "blackroad-dark"

# =============================================================================
# ENVIRONMENT VARIABLES SUMMARY
# =============================================================================

envVarsSummary:
  required:
    # Core
    - GITHUB_TOKEN
    # Deployment
    - RAILWAY_TOKEN
    - CLOUDFLARE_API_TOKEN
    - CLOUDFLARE_ACCOUNT_ID
  optional:
    # Additional deployment
    - VERCEL_TOKEN
    - DIGITALOCEAN_TOKEN
    # Auth & Payments
    - CLERK_SECRET_KEY
    - STRIPE_SECRET_KEY
    # AI
    - HUGGINGFACE_TOKEN
    # Project management
    - ASANA_ACCESS_TOKEN
    - NOTION_TOKEN
    # Tunnels
    - NGROK_AUTHTOKEN
    - TAILSCALE_AUTHKEY
