name: 🧬 Spawn Runner – Lucidia Agent Dispatcher

on:
  schedule:
    - cron: "0 */6 * * *"  # Every 6 hours
  workflow_dispatch:
    inputs:
      agent_name:
        description: "Agent name/identifier (e.g., guardian-clone-vault)"
        required: false
        type: string
      purpose:
        description: "Purpose of the spawned agent"
        required: false
        type: string
      summary:
        description: "Summary of why the agent was spawned"
        required: false
        type: string
      ttl:
        description: "Time-to-live for the agent (e.g., 96h)"
        required: false
        default: "96h"
        type: string
      awaiting_approval:
        description: "User to await approval from"
        required: false
        default: "alexa"
        type: string

permissions:
  contents: read

jobs:
  spawn-runner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🚀 Execute Spawn Runner
        id: spawn
        run: |
          echo "Spawning agent: ${{ inputs.agent_name || 'scheduled' }}"
          echo "Purpose: ${{ inputs.purpose || 'scheduled run' }}"
          echo "TTL: ${{ inputs.ttl || '96h' }}"
          node bot/spawn-runner.js 2>/dev/null || echo "spawn-runner.js not found, skipping"

      - name: 📢 Notify Webhook
        if: ${{ secrets.LUCIDIA_WEBHOOK != '' }}
        env:
          LUCIDIA_WEBHOOK: ${{ secrets.LUCIDIA_WEBHOOK }}
        run: |
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          RUN_URL="${REPO_URL}/actions/runs/${{ github.run_id }}"
          PAYLOAD=$(jq -n \
            --arg content "🚀 Lucidia spawn runner executed. Run: ${RUN_URL}" \
            '{content: $content}')
          curl -X POST -H "Content-Type: application/json" -d "$PAYLOAD" "$LUCIDIA_WEBHOOK" || true
