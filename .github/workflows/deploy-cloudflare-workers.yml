name: 🌩️ Deploy Cloudflare Workers

on:
  workflow_dispatch:
    inputs:
      worker:
        description: 'Worker to deploy'
        required: false
        default: 'agents'
        type: choice
        options:
          - agents
          - all
  push:
    branches: [master]
    paths:
      - 'blackroad-agents/worker/src/**'

jobs:
  deploy-agents:
    name: 🚀 Deploy blackroad-agents Worker
    runs-on: [self-hosted, blackroad-fleet, octavia]
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: 848cf0b18d51e0170e0d1537aec3505a
    steps:
      - uses: actions/checkout@v4

      - name: Build & Deploy agents worker
        working-directory: blackroad-agents/worker
        run: |
          export PATH=$HOME/npm-global/bin:$HOME/bin:$PATH
          node --version && npm --version
          npm install --silent
          wrangler deploy --config wrangler.toml
          echo "✅ blackroad-agents worker deployed"
          
      - name: Verify deployment
        run: |
          sleep 5
          curl -s https://blackroad-agents.blackroad.workers.dev/health | python3 -m json.tool || \
            curl -s https://blackroad-agents.blackroad.workers.dev/ | head -100 | \
            python3 -c "import json,sys; d=json.load(sys.stdin); print('Worker live:', d.get('status','ok'))" || \
            echo "Worker responding"
