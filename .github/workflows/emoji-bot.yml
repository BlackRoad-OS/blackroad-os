name: 🤖 Emoji-Bot – Reaction Handler

on:
  issue_comment:
    types: [created]
  reaction:
    types: [created]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write
  discussions: write

jobs:
  emoji-bot:
    runs-on: ubuntu-latest
    steps:
      - name: 🧬 Checkout Repo
        uses: actions/checkout@v4

      - name: 🧠 Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Install Dependencies
        run: npm install
        working-directory: ./bot

      - name: 🚦 Run Emoji Bot Handler
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EMOJI_BOT_DRY_RUN: "false"
        run: node index.js
        working-directory: ./bot
