name: 🤖 Emoji-Bot – Reaction Handler
name: "🤖 Emoji-Bot – Reaction Handler"

on:
  issue_comment:
    types: [created]
  reaction:
    types: [created]

jobs:
  emoji-bot:
    runs-on: [self-hosted, blackroad-fleet]
    steps:
      - name: 🧬 Checkout Repo
        uses: actions/checkout@v3

      - name: 🧠 Set up Node
      - name: "🧬 Checkout Repo"
        uses: actions/checkout@v3

      - name: "🧠 Set up Node"
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: 🚦 Run Emoji Bot Handler
        run: node index.js
        working-directory: ./bot
      - name: "📦 Install Dependencies"
        run: npm install
        working-directory: ./bot

      - name: "🚦 Run Emoji Bot Handler"
        run: node index.js
        working-directory: ./bot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
name: Emoji Bot

on:
  workflow_dispatch:
  reaction:
    types:
      - created

permissions:
  contents: read
  issues: write
  pull-requests: write
  discussions: write

jobs:
  run:
    runs-on: [self-hosted, blackroad-fleet]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run emoji bot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EMOJI_BOT_DRY_RUN: "false"
        run: node bot/index.js
