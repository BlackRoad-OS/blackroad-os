name: 📊 Weekly Emoji Digest Bot

on:
  schedule:
    # Runs every Monday at 9:00 AM UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      digest_issue_number:
        description: "Issue number to post the digest comment (optional)"
        required: false
        type: number

jobs:
  weekly-digest:
  digest-bot:
    # Run every Monday at 9:00 AM UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:
    # Allow manual triggering for testing
    inputs:
      days_to_look_back:
        description: "Number of days to look back for reactions"
        required: false
        default: "7"
      post_comment:
        description: "Post digest as comment on tracking issue"
        required: false
        default: "true"

jobs:
  generate-digest:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    

    steps:
      - name: 🧬 Checkout Repo
        uses: actions/checkout@v4

      - name: 🧠 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: 🧠 Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 📊 Run Weekly Digest Bot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DIGEST_ISSUE: ${{ inputs.digest_issue || '' }}
        run: node digest.js
        working-directory: ./bot
          DIGEST_ISSUE_NUMBER: ${{ inputs.digest_issue_number }}
        run: |
          node -e "
          const { runWeeklyDigest } = require('./bot/handlers/digest-bot.js');

          const repoEnv = process.env.GITHUB_REPOSITORY;
          if (!repoEnv || !repoEnv.includes('/')) {
            console.error('❌ GITHUB_REPOSITORY environment variable is not set or invalid');
            process.exit(1);
          }

          const [owner, repo] = repoEnv.split('/');
          const digestIssueNumber = process.env.DIGEST_ISSUE_NUMBER ? parseInt(process.env.DIGEST_ISSUE_NUMBER) : null;

          runWeeklyDigest(owner, repo, digestIssueNumber)
            .then(result => {
              console.log('📊 Digest generation complete!');
              console.log('Total reactions:', result.stats.total);
            })
            .catch(err => {
              console.error('❌ Digest generation failed:', err.message);
              process.exit(1);
            });
          "

    steps:
      - name: 🧬 Checkout Repository
        uses: actions/checkout@v3

      - name: 🧠 Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: 📊 Run Digest Bot
        run: node bot/digest-bot.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          DAYS_TO_LOOK_BACK: ${{ github.event.inputs.days_to_look_back || '7' }}
          POST_COMMENT: ${{ github.event.inputs.post_comment || 'true' }}
          DIGEST_ISSUE_NUMBER: ${{ vars.DIGEST_ISSUE_NUMBER || '1' }}

      - name: 📤 Upload Digest Artifact
        uses: actions/upload-artifact@v3
        with:
          name: weekly-digest
          path: digest.md
          retention-days: 30
